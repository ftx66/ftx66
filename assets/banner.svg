    <text x="77" y="25" text-anchor="middle" fill="#0F766E" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700">Research Builder</text>
  </g>
  <g transform="translate(848 286)">
    <rect width="130" height="40" rx="20" fill="url(#pill)" stroke="#7DD3FC" />
    <text x="65" y="25" text-anchor="middle" fill="#155E75" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700">Open Source</text>
  </g>

